    <rect x="0" y="22" width="14" height="16" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0.5"/>
    <rect x="0" y="38" width="14" height="16" fill="#0038A8"/>
  </g>
  <text x="28" y="42" font-family="-apple-system,'Segoe UI',Inter,system-ui,sans-serif" font-size="34" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Idris</text>
</svg>
