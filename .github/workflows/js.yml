name: Lint JavaScript
on: [push, pull_request]
jobs:
  lint:
    uses: open-contracting/.github/.github/workflows/js.yml@main
    permissions:
      contents: read
    with:
      lockfile_path: ids-drr-paraguay-branding/package-lock.json
      # The ids-drr-branding-types peer is consumed via a `github:` URL.
      lockfile_lint_args: --allowed-hosts npm github.com --allowed-schemes "https:" "git+https:" "git+ssh:"
