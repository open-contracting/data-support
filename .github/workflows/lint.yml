name: Lint
on: [push, pull_request]
jobs:
  lint:
    uses: open-contracting/.github/.github/workflows/lint.yml@main
    permissions:
      contents: write
    secrets:
      personal-access-token: ${{ secrets.PAT }}
    with:
      ocds-extension-paths: netherlands_ocds_transformer/local_extensions.json
      # Extends and stores the release schema to unflatten data.
      ocds-schema-exceptions: schema.json
